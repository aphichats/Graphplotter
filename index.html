<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Plotter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f5f5f0;color:#222;padding:16px}
.wrap{max-width:1100px;margin:0 auto}
h1{font-size:15px;font-weight:600;color:#444;margin-bottom:14px;letter-spacing:.02em}
.main-grid{display:grid;grid-template-columns:210px 1fr;gap:12px}
.panel{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:11px}
.panel+.panel{margin-top:10px}
.pt{font-size:10px;font-weight:600;color:#888;margin:0 0 7px;text-transform:uppercase;letter-spacing:.05em}
.field{display:flex;flex-direction:column;gap:2px;margin-bottom:7px}
.field label{font-size:10px;color:#888}
input[type=text],input[type=number]{font-family:inherit;font-size:12px;padding:4px 7px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#222;outline:none;width:100%}
input[type=text]:focus,input[type=number]:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.seg{display:flex;border:0.5px solid #ccc;border-radius:6px;overflow:hidden;margin-bottom:7px}
.seg button{flex:1;border:none;background:transparent;padding:4px 0;font-size:10px;cursor:pointer;color:#888;border-right:0.5px solid #ddd;font-family:inherit}
.seg button:last-child{border-right:none}
.seg button.active{background:#f0f0f0;color:#222;font-weight:600}
.tgl{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.tgl label{font-size:10px;color:#666;cursor:pointer}
.cprow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.cprow label{font-size:10px;color:#888;flex:1}
.cpwrap{position:relative;border-radius:6px;overflow:hidden;border:0.5px solid #ccc;cursor:pointer;flex-shrink:0}
.cpwrap input[type=color]{display:block;border:none;padding:0;cursor:pointer}
.tabs{display:flex;gap:3px;margin-bottom:8px}
.tabs button{flex:1;padding:4px 0;font-size:11px;border:0.5px solid #ddd;border-radius:6px;background:transparent;cursor:pointer;color:#888;font-family:inherit}
.tabs button.active{background:#f0f0f0;color:#222;font-weight:600}
.ds-panel{display:none}.ds-panel.on{display:block}
.ds-header{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.ds-header input[type=text]{flex:1;font-size:11px}
.ds-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,0.12)}
.lseg{display:flex;border:0.5px solid #ccc;border-radius:6px;overflow:hidden;margin-bottom:6px}
.lseg button{flex:1;border:none;background:transparent;padding:3px 0;font-size:10px;cursor:pointer;color:#888;border-right:0.5px solid #ddd;font-family:inherit}
.lseg button:last-child{border-right:none}
.lseg button.active{background:#f0f0f0;color:#222;font-weight:600}
.tr-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.tr-row label{font-size:10px;color:#666;cursor:pointer}
.lbl-label{font-size:10px;color:#888;margin-bottom:3px}
.lblseg{display:flex;border:0.5px solid #ccc;border-radius:6px;overflow:hidden;margin-bottom:8px}
.lblseg button{flex:1;border:none;background:transparent;padding:3px 0;font-size:10px;cursor:pointer;color:#888;border-right:0.5px solid #ddd;font-family:inherit}
.lblseg button:last-child{border-right:none}
.lblseg button.active{background:#f0f0f0;color:#222;font-weight:600}
.dt{width:100%;border-collapse:collapse;font-size:11px}
.dt th{font-size:10px;color:#888;padding:3px 5px;border:0.5px solid #ddd;background:#fafafa;text-align:center}
.dt td{border:0.5px solid #ddd;padding:1px}
.dt td input{border:none;background:transparent;text-align:center;width:100%;font-size:11px;color:#222;padding:3px;outline:none;font-family:inherit}
.dt td input:focus{background:#eef5ff}
.db{background:none;border:none;color:#aaa;cursor:pointer;font-size:10px;padding:2px 5px;width:100%;font-family:inherit}
.db:hover{color:#c33}
.brow{display:flex;gap:5px;margin-top:7px}
button.badd{font-size:11px;padding:4px 12px;cursor:pointer;font-family:inherit;background:#fff;border:0.5px solid #ccc;border-radius:6px;color:#444}
button.badd:hover{background:#f5f5f5}
button.bplot{font-size:11px;padding:5px 14px;font-weight:600;flex:1;cursor:pointer;font-family:inherit;background:#378ADD;border:none;border-radius:6px;color:#fff}
button.bplot:hover{background:#2a6fb5}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.sc{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:7px 8px}
.sl{font-size:9px;color:#888;margin-bottom:4px;text-align:center;text-transform:uppercase;letter-spacing:.04em}
.sv-line{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.sv-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sv-val{font-size:11px;font-weight:600;color:#222}
.legend-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chart-area{margin-top:10px}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.ctop span{font-size:10px;color:#888}
button.expbtn{font-size:10px;padding:4px 12px;cursor:pointer;font-family:inherit;background:#fff;border:0.5px solid #ccc;border-radius:6px;color:#444}
button.expbtn:hover{background:#f5f5f5}
.couter{width:100%;max-width:560px;margin:0 auto;border-radius:10px;overflow:hidden;border:0.5px solid #ddd}
.cinner{position:relative;width:100%}
</style>
</head>
<body>
<div class="wrap">
<h1>Graph Plotter</h1>
<div class="main-grid">
  <div>
    <div class="panel">
      <div class="pt">ชื่อและแกน</div>
      <div class="field"><label>ชื่อกราฟ</label><input type="text" id="title" placeholder="Lineweaver-Burk Plot"></div>
      <div class="field"><label>ชื่อแกน X</label><input type="text" id="xlabel" placeholder="1/[S] (mM⁻¹)"></div>
      <div class="field"><label>ชื่อแกน Y</label><input type="text" id="ylabel" placeholder="1/V (min/µmol)"></div>
      <div class="field" style="margin-bottom:3px"><label>ตำแหน่งแกน Y</label></div>
      <div class="seg"><button class="active" onclick="setYPos('left',this)">Left</button><button onclick="setYPos('center',this)">Center</button><button onclick="setYPos('right',this)">Right</button></div>
      <div class="field" style="margin-bottom:3px"><label>อัตราส่วน</label></div>
      <div class="seg" id="ratioSeg">
        <button onclick="setRatio(4/3,this)">4:3</button>
        <button class="active" onclick="setRatio(5/3,this)">5:3</button>
        <button onclick="setRatio(16/9,this)">16:9</button>
        <button onclick="setRatio(1,this)">1:1</button>
      </div>
      <div class="cprow"><label>สีแกน X</label><div class="cpwrap"><input type="color" id="xAxisColor" value="#333333" style="width:34px;height:22px"></div></div>
      <div class="cprow"><label>สีแกน Y</label><div class="cpwrap"><input type="color" id="yAxisColor" value="#333333" style="width:34px;height:22px"></div></div>
      <div class="tgl"><input type="checkbox" id="showEq" checked><label for="showEq">แสดงสมการในกราฟ</label></div>
      <div class="tgl"><input type="checkbox" id="showR2c" checked><label for="showR2c">แสดง R² ในกราฟ</label></div>
    </div>
    <div class="panel">
      <div class="pt">ช่วงและ Tick</div>
      <div class="g2">
        <div class="field"><label>X min</label><input type="number" id="xmin" step="any" placeholder="auto"></div>
        <div class="field"><label>X max</label><input type="number" id="xmax" step="any" placeholder="auto"></div>
        <div class="field"><label>Y min</label><input type="number" id="ymin" step="any" placeholder="auto"></div>
        <div class="field"><label>Y max</label><input type="number" id="ymax" step="any" placeholder="auto"></div>
        <div class="field"><label>X Major</label><input type="number" id="xmajor" step="any" placeholder="auto"></div>
        <div class="field"><label>X Minor</label><input type="number" id="xminor" step="any" placeholder="—"></div>
        <div class="field"><label>Y Major</label><input type="number" id="ymajor" step="any" placeholder="auto"></div>
        <div class="field"><label>Y Minor</label><input type="number" id="yminor" step="any" placeholder="—"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="pt">ข้อมูล</div>
    <div class="tabs">
      <button class="active" onclick="switchTab(0,this)">Dataset 1</button>
      <button onclick="switchTab(1,this)">Dataset 2</button>
      <button onclick="switchTab(2,this)">Dataset 3</button>
    </div>

    <div id="dsp0" class="ds-panel on">
      <div class="ds-header"><input type="checkbox" id="dse0" checked><div class="ds-dot" id="dot0" style="background:#378ADD"></div><input type="text" id="dsname0" value="Dataset 1"></div>
      <div class="cprow"><label>สีจุด</label><div class="cpwrap"><input type="color" id="dscol0" value="#378ADD" style="width:34px;height:22px" oninput="document.getElementById('dot0').style.background=this.value"></div></div>
      <div class="cprow"><label>สี Trendline</label><div class="cpwrap"><input type="color" id="dstrcol0" value="#D85A30" style="width:34px;height:22px"></div></div>
      <div style="font-size:10px;color:#888;margin-bottom:3px">รูปแบบเส้น</div>
      <div class="lseg" id="lseg0"><button class="active" onclick="setLineMode(0,'none',this)">จุดเท่านั้น</button><button onclick="setLineMode(0,'line',this)">เส้นตรง</button><button onclick="setLineMode(0,'smooth',this)">Smooth</button></div>
      <div class="tr-row"><input type="checkbox" id="dstr0" checked><label for="dstr0">แสดง Trendline</label></div>
      <div class="lbl-label">แสดงค่าบนจุด</div>
      <div class="lblseg" id="lblseg0"><button class="active" onclick="setLblMode(0,'none',this)">ไม่แสดง</button><button onclick="setLblMode(0,'both',this)">(x, y)</button><button onclick="setLblMode(0,'x',this)">X เท่านั้น</button><button onclick="setLblMode(0,'y',this)">Y เท่านั้น</button></div>
      <table class="dt"><thead><tr><th>X</th><th>Y</th><th></th></tr></thead><tbody id="dtb0"></tbody></table>
      <div class="brow"><button class="badd" onclick="addRow(0)">+ เพิ่มแถว</button><button class="bplot" onclick="plotChart()">▶ Plot</button></div>
    </div>

    <div id="dsp1" class="ds-panel">
      <div class="ds-header"><input type="checkbox" id="dse1"><div class="ds-dot" id="dot1" style="background:#1D9E75"></div><input type="text" id="dsname1" value="Dataset 2"></div>
      <div class="cprow"><label>สีจุด</label><div class="cpwrap"><input type="color" id="dscol1" value="#1D9E75" style="width:34px;height:22px" oninput="document.getElementById('dot1').style.background=this.value"></div></div>
      <div class="cprow"><label>สี Trendline</label><div class="cpwrap"><input type="color" id="dstrcol1" value="#BA7517" style="width:34px;height:22px"></div></div>
      <div style="font-size:10px;color:#888;margin-bottom:3px">รูปแบบเส้น</div>
      <div class="lseg" id="lseg1"><button class="active" onclick="setLineMode(1,'none',this)">จุดเท่านั้น</button><button onclick="setLineMode(1,'line',this)">เส้นตรง</button><button onclick="setLineMode(1,'smooth',this)">Smooth</button></div>
      <div class="tr-row"><input type="checkbox" id="dstr1" checked><label for="dstr1">แสดง Trendline</label></div>
      <div class="lbl-label">แสดงค่าบนจุด</div>
      <div class="lblseg" id="lblseg1"><button class="active" onclick="setLblMode(1,'none',this)">ไม่แสดง</button><button onclick="setLblMode(1,'both',this)">(x, y)</button><button onclick="setLblMode(1,'x',this)">X เท่านั้น</button><button onclick="setLblMode(1,'y',this)">Y เท่านั้น</button></div>
      <table class="dt"><thead><tr><th>X</th><th>Y</th><th></th></tr></thead><tbody id="dtb1"></tbody></table>
      <div class="brow"><button class="badd" onclick="addRow(1)">+ เพิ่มแถว</button><button class="bplot" onclick="plotChart()">▶ Plot</button></div>
    </div>

    <div id="dsp2" class="ds-panel">
      <div class="ds-header"><input type="checkbox" id="dse2"><div class="ds-dot" id="dot2" style="background:#BA7517"></div><input type="text" id="dsname2" value="Dataset 3"></div>
      <div class="cprow"><label>สีจุด</label><div class="cpwrap"><input type="color" id="dscol2" value="#BA7517" style="width:34px;height:22px" oninput="document.getElementById('dot2').style.background=this.value"></div></div>
      <div class="cprow"><label>สี Trendline</label><div class="cpwrap"><input type="color" id="dstrcol2" value="#7F77DD" style="width:34px;height:22px"></div></div>
      <div style="font-size:10px;color:#888;margin-bottom:3px">รูปแบบเส้น</div>
      <div class="lseg" id="lseg2"><button class="active" onclick="setLineMode(2,'none',this)">จุดเท่านั้น</button><button onclick="setLineMode(2,'line',this)">เส้นตรง</button><button onclick="setLineMode(2,'smooth',this)">Smooth</button></div>
      <div class="tr-row"><input type="checkbox" id="dstr2" checked><label for="dstr2">แสดง Trendline</label></div>
      <div class="lbl-label">แสดงค่าบนจุด</div>
      <div class="lblseg" id="lblseg2"><button class="active" onclick="setLblMode(2,'none',this)">ไม่แสดง</button><button onclick="setLblMode(2,'both',this)">(x, y)</button><button onclick="setLblMode(2,'x',this)">X เท่านั้น</button><button onclick="setLblMode(2,'y',this)">Y เท่านั้น</button></div>
      <table class="dt"><thead><tr><th>X</th><th>Y</th><th></th></tr></thead><tbody id="dtb2"></tbody></table>
      <div class="brow"><button class="badd" onclick="addRow(2)">+ เพิ่มแถว</button><button class="bplot" onclick="plotChart()">▶ Plot</button></div>
    </div>
  </div>
</div>

<div class="srow">
  <div class="sc"><div class="sl">Slope</div><div id="svS"></div></div>
  <div class="sc"><div class="sl">Y-intercept</div><div id="svI"></div></div>
  <div class="sc"><div class="sl">R²</div><div id="svR"></div></div>
</div>

<div class="chart-area">
  <div class="ctop"><span id="ratioLabel">5:3</span><button class="expbtn" onclick="exportChart()">↓ Export PNG</button></div>
  <div class="legend-row" id="legendRow"></div>
  <div class="couter"><div class="cinner" id="chartInner"><canvas id="myChart"></canvas></div></div>
</div>
</div>

<script>
let chart=null,yPos='left',ratio=5/3;
const rNames={[4/3]:'4:3',[5/3]:'5:3',[16/9]:'16:9',[1]:'1:1'};
const ci=document.getElementById('chartInner');
const lineModes=['none','none','none'];
const lblModes=['none','none','none'];

function addRow(d){
  const tb=document.getElementById('dtb'+d);
  const tr=document.createElement('tr');
  tr.innerHTML='<td><input type="number" step="any" placeholder="0"></td><td><input type="number" step="any" placeholder="0"></td><td><button class="db" onclick="this.closest(\'tr\').remove()">✕</button></td>';
  tb.appendChild(tr);
  const inputs=tr.querySelectorAll('input[type=number]');
  inputs.forEach((inp,colIdx)=>{
    inp.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      e.preventDefault();
      const nextRow=tr.nextElementSibling;
      if(nextRow){
        nextRow.querySelectorAll('input[type=number]')[colIdx].focus();
      } else {
        addRow(d);
        tb.lastElementChild.querySelectorAll('input[type=number]')[colIdx].focus();
      }
    });
  });
}

for(let d=0;d<3;d++) for(let r=0;r<6;r++) addRow(d);

function switchTab(i,btn){document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.ds-panel').forEach(p=>p.classList.remove('on'));document.getElementById('dsp'+i).classList.add('on');}
function setLineMode(d,m,btn){lineModes[d]=m;document.getElementById('lseg'+d).querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setLblMode(d,m,btn){lblModes[d]=m;document.getElementById('lblseg'+d).querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setYPos(v,btn){yPos=v;btn.closest('.seg').querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setRatio(r,btn){ratio=r;document.getElementById('ratioSeg').querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');updateSize();document.getElementById('ratioLabel').textContent=rNames[r]||r.toFixed(2);}
function updateSize(){const w=ci.offsetWidth||500;const h=Math.round(w/ratio);ci.style.height=h+'px';document.getElementById('myChart').style.height=h+'px';if(chart)chart.resize();}
function getN(id){const v=document.getElementById(id).value;return v===''?null:parseFloat(v);}
function getS(id){return document.getElementById(id).value.trim();}
function fmt(n){return(Math.abs(n)<0.001||Math.abs(n)>=10000)?n.toExponential(3):parseFloat(n.toFixed(4)).toString();}
function getRows(d){return[...document.getElementById('dtb'+d).querySelectorAll('tr')].map(r=>{const ins=r.querySelectorAll('input[type=number]');const x=parseFloat(ins[0].value),y=parseFloat(ins[1].value);return(!isNaN(x)&&!isNaN(y))?{x,y}:null;}).filter(Boolean);}
function linReg(pts){const n=pts.length,xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);const sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0);const sxy=pts.reduce((a,p)=>a+p.x*p.y,0),sx2=xs.reduce((a,b)=>a+b*b,0);const denom=n*sx2-sx*sx;if(Math.abs(denom)<1e-12)return null;const slope=(n*sxy-sx*sy)/denom,intercept=(sy-slope*sx)/n;const ym=sy/n,ss=ys.reduce((a,v)=>a+(v-ym)**2,0);const sr=pts.reduce((a,p)=>a+(p.y-(slope*p.x+intercept))**2,0);return{slope,intercept,r2:ss<1e-12?1:1-sr/ss};}
function genMinor(min,max,maj,minor){if(!minor||minor<=0||!maj||maj<=0||minor>=maj)return[];const t=[];const s=Math.ceil((min-1e-9)/minor)*minor;for(let v=s;v<=max+1e-9;v=parseFloat((v+minor).toFixed(12))){const rv=parseFloat(v.toFixed(10));if(Math.abs(rv/maj-Math.round(rv/maj))>1e-6)t.push(rv);}return t;}
function exportChart(){if(!chart){alert('กด Plot ก่อนครับ');return;}const lnk=document.createElement('a');lnk.download=(getS('title')||'graph').replace(/\s+/g,'_')+'.png';lnk.href=document.getElementById('myChart').toDataURL('image/png');document.body.appendChild(lnk);lnk.click();document.body.removeChild(lnk);}
function makeLblText(pt,mode){if(mode==='both')return`(${fmt(pt.x)}, ${fmt(pt.y)})`;if(mode==='x')return`${fmt(pt.x)}`;if(mode==='y')return`${fmt(pt.y)}`;return null;}

function plotChart(){
  const allPts=[],regs=[],ptCols=[],trCols=[],labels=[],showTrend=[],modes=[];
  for(let d=0;d<3;d++){
    if(!document.getElementById('dse'+d).checked){allPts.push([]);regs.push(null);ptCols.push(null);trCols.push(null);labels.push(null);showTrend.push(false);modes.push('none');continue;}
    const pts=getRows(d);pts.sort((a,b)=>a.x-b.x);
    allPts.push(pts);ptCols.push(document.getElementById('dscol'+d).value);trCols.push(document.getElementById('dstrcol'+d).value);
    labels.push(document.getElementById('dsname'+d).value||('Dataset '+(d+1)));
    regs.push(pts.length>=2?linReg(pts):null);showTrend.push(document.getElementById('dstr'+d).checked);modes.push(lineModes[d]);
  }
  ['svS','svI','svR'].forEach(id=>document.getElementById(id).innerHTML='');
  let hasAny=false;
  for(let d=0;d<3;d++){if(!regs[d])continue;hasAny=true;const{slope,intercept,r2}=regs[d];const vals=[fmt(slope),fmt(intercept),r2.toFixed(4)];['svS','svI','svR'].forEach((id,i)=>{const row=document.createElement('div');row.className='sv-line';row.innerHTML=`<div class="sv-dot" style="background:${ptCols[d]}"></div><span class="sv-val">${vals[i]}</span>`;document.getElementById(id).appendChild(row);});}
  if(!hasAny)['svS','svI','svR'].forEach(id=>document.getElementById(id).innerHTML='<span class="sv-val">—</span>');
  const legRow=document.getElementById('legendRow');legRow.innerHTML='';
  for(let d=0;d<3;d++){if(!labels[d])continue;const item=document.createElement('div');item.className='legend-item';item.innerHTML=`<div class="legend-dot" style="background:${ptCols[d]}"></div><span>${labels[d]}</span>`;legRow.appendChild(item);}
  const allX=[],allY=[];allPts.forEach(pts=>pts.forEach(p=>{allX.push(p.x);allY.push(p.y);}));
  if(allX.length===0){alert('ไม่มีข้อมูล');return;}
  const xmin=getN('xmin')??Math.min(...allX),xmax=getN('xmax')??Math.max(...allX);
  const ymin=getN('ymin')??Math.min(...allY),ymax=getN('ymax')??Math.max(...allY);
  const xMaj=getN('xmajor'),yMaj=getN('ymajor');
  const xMinT=genMinor(xmin,xmax,xMaj,getN('xminor'));
  const yMinT=genMinor(ymin,ymax,yMaj,getN('yminor'));
  const xAxisColor=document.getElementById('xAxisColor').value;
  const yAxisColor=document.getElementById('yAxisColor').value;
  updateSize();

  const whiteBg={id:'wb',beforeDraw(c){const{ctx,width,height}=c;ctx.save();ctx.fillStyle='#fff';ctx.fillRect(0,0,width,height);ctx.restore();}};
  const plug={
    id:'main',
    beforeDatasetsDraw(c){
      const{ctx,chartArea:{left,right,top,bottom},scales:{x,y}}=c;
      ctx.save();
      ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=0.5;
      xMinT.forEach(v=>{const p=x.getPixelForValue(v);if(p>=left&&p<=right){ctx.beginPath();ctx.moveTo(p,top);ctx.lineTo(p,bottom);ctx.stroke();}});
      yMinT.forEach(v=>{const p=y.getPixelForValue(v);if(p>=top&&p<=bottom){ctx.beginPath();ctx.moveTo(left,p);ctx.lineTo(right,p);ctx.stroke();}});
      const ay=(ymin<=0&&ymax>=0)?y.getPixelForValue(0):bottom;
      const ax=yPos==='right'?right:yPos==='center'&&xmin<=0&&xmax>=0?x.getPixelForValue(0):left;
      ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.8;
      xMinT.forEach(v=>{const p=x.getPixelForValue(v);if(p>=left&&p<=right){ctx.beginPath();ctx.moveTo(p,ay-3);ctx.lineTo(p,ay+3);ctx.stroke();}});
      yMinT.forEach(v=>{const p=y.getPixelForValue(v);if(p>=top&&p<=bottom){ctx.beginPath();ctx.moveTo(ax-3,p);ctx.lineTo(ax+3,p);ctx.stroke();}});
      ctx.save();ctx.beginPath();ctx.rect(left,top,right-left,bottom-top);ctx.clip();
      for(let d=0;d<3;d++){if(!regs[d]||!showTrend[d])continue;const{slope,intercept}=regs[d];ctx.strokeStyle=trCols[d];ctx.lineWidth=1.5;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(x.getPixelForValue(xmin),y.getPixelForValue(slope*xmin+intercept));ctx.lineTo(x.getPixelForValue(xmax),y.getPixelForValue(slope*xmax+intercept));ctx.stroke();}
      ctx.setLineDash([]);ctx.restore();ctx.restore();
    },
    afterDatasetsDraw(c){
      const{ctx,chartArea:{left,right,top,bottom},scales:{x,y}}=c;
      ctx.save();
      const ay=(ymin<=0&&ymax>=0)?y.getPixelForValue(0):bottom;
      const ax=yPos==='right'?right:yPos==='center'&&xmin<=0&&xmax>=0?x.getPixelForValue(0):left;
      ctx.strokeStyle=xAxisColor;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(left,ay);ctx.lineTo(right,ay);ctx.stroke();
      ctx.strokeStyle=yAxisColor;ctx.beginPath();ctx.moveTo(ax,top);ctx.lineTo(ax,bottom);ctx.stroke();
      if(yPos==='center'&&xmin<=0&&xmax>=0){ctx.fillStyle='#444';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';y.ticks.forEach(t=>{const p=y.getPixelForValue(t.value);if(p>=top&&p<=bottom&&Math.abs(t.value)>1e-9){ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(ax-3,p);ctx.lineTo(ax,p);ctx.stroke();ctx.fillText(parseFloat(t.value.toFixed(5)).toString(),ax-5,p);}});}
      ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
      for(let d=0;d<3;d++){const mode=lblModes[d];if(mode==='none'||!allPts[d]||allPts[d].length===0)continue;allPts[d].forEach(pt=>{const px=x.getPixelForValue(pt.x),py=y.getPixelForValue(pt.y);if(px<left||px>right||py<top||py>bottom)return;const txt=makeLblText(pt,mode);if(!txt)return;const tw=ctx.measureText(txt).width;ctx.fillStyle='rgba(255,255,255,0.88)';ctx.beginPath();ctx.roundRect(px-tw/2-3,py-19,tw+6,14,3);ctx.fill();ctx.fillStyle=ptCols[d];ctx.fillText(txt,px,py-7);});}
      if(document.getElementById('showEq').checked){
        ctx.font='bold 10px sans-serif';const active=[];for(let d=0;d<3;d++){if(regs[d])active.push(d);}
        const lh=13,pad=3;let yOff=bottom-pad;
        for(let i=active.length-1;i>=0;i--){const d=active[i];const{slope,intercept,r2}=regs[d];const sign=intercept<0?'− ':'+ ';const lines=document.getElementById('showR2c').checked?[`y=${fmt(slope)}x ${sign}${fmt(Math.abs(intercept))}`,`R²=${r2.toFixed(4)}`]:[`y=${fmt(slope)}x ${sign}${fmt(Math.abs(intercept))}`];const boxH=lines.length*lh+pad*2;yOff-=boxH;const mw=Math.max(...lines.map(l=>ctx.measureText(l).width));ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillRect(left+4,yOff,mw+pad*2+4,boxH);ctx.fillStyle=trCols[d]||ptCols[d];ctx.fillRect(left+4,yOff,3,boxH);lines.forEach((l,li)=>ctx.fillText(l,left+4+pad+3,yOff+pad+li*lh));yOff-=4;}
      }
      ctx.restore();
    }
  };
  const chartDS=[];
  for(let d=0;d<3;d++){const pts=allPts[d];if(!pts||pts.length===0)continue;const m=modes[d],showLine=(m==='line'||m==='smooth'),tension=m==='smooth'?0.4:0;chartDS.push({label:labels[d],data:pts,backgroundColor:ptCols[d],borderColor:ptCols[d],borderWidth:1.5,pointRadius:5,pointHoverRadius:8,pointBackgroundColor:ptCols[d],pointBorderColor:'#fff',pointBorderWidth:1.5,showLine,tension,fill:false});}
  if(chartDS.length===0){alert('ไม่มี dataset');return;}
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('myChart'),{
    type:'line',plugins:[whiteBg,plug],data:{datasets:chartDS},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},title:{display:!!getS('title'),text:getS('title'),font:{size:13,weight:'600'},color:'#333'},tooltip:{callbacks:{label:ctx=>`(${fmt(ctx.parsed.x)}, ${fmt(ctx.parsed.y)})`}}},
      scales:{
        x:{type:'linear',min:xmin,max:xmax,border:{display:false},title:{display:!!getS('xlabel'),text:getS('xlabel'),color:'#444',font:{size:11}},ticks:{color:'#444',font:{size:10},...(xMaj?{stepSize:xMaj}:{})},grid:{color:'rgba(0,0,0,0.07)'}},
        y:{min:ymin,max:ymax,position:yPos==='right'?'right':'left',border:{display:false},title:{display:yPos!=='center'&&!!getS('ylabel'),text:getS('ylabel'),color:'#444',font:{size:11}},ticks:{color:'#444',font:{size:10},display:yPos!=='center',...(yMaj?{stepSize:yMaj}:{})},grid:{color:'rgba(0,0,0,0.07)'}}
      }
    }
  });
}
window.addEventListener('load',()=>updateSize());
window.addEventListener('resize',()=>updateSize());
</script>
</body>
</html>
